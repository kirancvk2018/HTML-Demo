<!DOCTYPE html><html><head><meta charset="utf-8"><title>LLM Context Window Simulator v5</title><script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script><style>body{margin:0;font-family:Segoe UI;background:#0f172a;color:#fff}.c{max-width:1600px;margin:auto;padding:16px}.g{display:grid;grid-template-columns:36% 64%;gap:14px}.card{background:#1e293b;padding:12px;border-radius:12px}.k{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.k>div{background:#0b1220;padding:10px;border-radius:8px;text-align:center}.bar{display:flex;height:44px;border:2px solid #fff;border-radius:8px;overflow:hidden}.seg{transition:.2s}label{display:flex;justify-content:space-between;margin-top:8px}input[type=range]{width:100%}</style></head><body><div class=c><h1>LLM Context Window Studio</h1><div class=k><div>Context<h3 id=ctx></h3></div><div>Output<h3 id=limit></h3></div><div>Used<h3 id=used></h3></div><div>Remaining<h3 id=remain></h3></div><div>%<h3 id=pct></h3></div></div><div class=g><div class=card><label>Model<select id=model onchange=update()><option value="1000000,200000">GPT-5.5</option><option value="1000000,200000">Claude Sonnet 4.6</option><option value="200000,64000">Claude Haiku 4.5</option></select></label><label>System<span id=v1></span></label><input id=s1 type=range min=0 max=50000 value=5000 oninput=update()><label>History<span id=v2></span></label><input id=s2 type=range min=0 max=500000 value=100000 step=5000 oninput=update()><label>Docs<span id=v3></span></label><input id=s3 type=range min=0 max=900000 value=300000 step=5000 oninput=update()><label>Prompt<span id=v4></span></label><input id=s4 type=range min=0 max=100000 value=10000 step=1000 oninput=update()><label>Output<span id=v5></span></label><input id=s5 type=range min=0 max=250000 value=50000 step=1000 oninput=update()><br><button onclick=nextTurn()>Next Conversation Turn</button><p id=msg></p></div><div class=card><div class=bar><div id=b1 class=seg style="background:#2563eb"></div><div id=b2 class=seg style="background:#22c55e"></div><div id=b3 class=seg style="background:#facc15"></div><div id=b4 class=seg style="background:#fb923c"></div><div id=b5 class=seg style="background:#ef4444"></div><div id=b6 class=seg style="background:#475569"></div></div><div id=pie style="height:320px"></div><div id=tip></div></div></div></div><script>function f(x){return Number(x).toLocaleString()}function nextTurn(){s2.value=Math.min(+s2.max,+s2.value+15000);update()}function update(){let p=model.value.split(',');let c=+p[0],o=+p[1];let a=[+s1.value,+s2.value,+s3.value,+s4.value,+s5.value];[v1,v2,v3,v4,v5].forEach((e,i)=>e.innerHTML=f(a[i])+" tokens");let t=a.reduce((x,y)=>x+y,0),r=Math.max(0,c-t);ctx.innerHTML=f(c);limit.innerHTML=f(o);used.innerHTML=f(t);remain.innerHTML=f(r);pct.innerHTML=((t/c)*100).toFixed(1)+"%";let vals=[...a,r];["b1","b2","b3","b4","b5","b6"].forEach((id,i)=>document.getElementById(id).style.width=(vals[i]/c*100)+"%");Plotly.newPlot("pie",[{type:"pie",hole:.55,labels:["System","History","Docs","Prompt","Output","Remaining"],values:vals}],{paper_bgcolor:"#1e293b",font:{color:"white"},margin:{t:10,b:10,l:10,r:10}},{displayModeBar:false});tip.innerHTML="<b>Repository:</b> 2.5M tokens → Retrieved <b>"+f(a[2])+"</b> tokens";msg.innerHTML=(a[4]>o)?"❌ Output limit exceeded":(t>c)?"❌ Context exceeded":"✅ Request fits";}update();</script></body></html>
